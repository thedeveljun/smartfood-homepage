<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>관리자 로그인 — 스마트푸드(주)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="padding:40px;width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:28px">
      <span class="logo-mark" style="margin:0 auto 14px"><i class="ti ti-lock"></i></span>
      <h1 style="font-size:22px;color:var(--cream)">관리자 로그인</h1>
      <p style="color:var(--text-mute);font-size:13px;margin-top:6px">스마트푸드(주) 관리 시스템</p>
    </div>
    <div class="form-row"><label>이메일</label><input id="email" type="email" placeholder="admin@smartfood.kr"></div>
    <div class="form-row"><label>비밀번호</label><input id="password" type="password" placeholder="••••••••"></div>
    <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:8px" id="loginBtn"><i class="ti ti-login"></i> 로그인</button>
    <div class="msg" id="msg"></div>
    <p style="text-align:center;margin-top:16px"><a href="#" class="gold" style="font-size:13px" id="resetBtn">비밀번호를 잊으셨나요?</a></p>
    <p style="text-align:center;margin-top:10px"><a href="../index.html" class="gold" style="font-size:13px"><i class="ti ti-arrow-left"></i> 홈페이지로</a></p>
  </div>
</div>
<script type="module">
  import { auth } from '../js/firebase-config.js';
  import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  onAuthStateChanged(auth, u=>{ if(u) location.href='dashboard.html'; });

  const btn=document.getElementById('loginBtn'), msg=document.getElementById('msg');
  btn.addEventListener('click', async ()=>{
    const email=document.getElementById('email').value.trim();
    const pw=document.getElementById('password').value;
    if(!email||!pw){ msg.className='msg err'; msg.textContent='이메일과 비밀번호를 입력하세요.'; return; }
    btn.disabled=true; btn.textContent='로그인 중...';
    try{
      await signInWithEmailAndPassword(auth,email,pw);
      location.href='dashboard.html';
    }catch(e){
      msg.className='msg err'; msg.textContent='로그인 실패: 이메일/비밀번호를 확인하세요.';
      btn.disabled=false; btn.innerHTML='<i class="ti ti-login"></i> 로그인';
    }
  });
  document.getElementById('password').addEventListener('keydown',e=>{ if(e.key==='Enter')btn.click(); });

  // 비밀번호 재설정 — 입력한 이메일로 재설정 링크 발송
  document.getElementById('resetBtn').addEventListener('click', async e=>{
    e.preventDefault();
    const email=document.getElementById('email').value.trim();
    if(!email){ msg.className='msg err'; msg.textContent='이메일을 먼저 입력한 뒤 다시 눌러주세요.'; return; }
    try{
      await sendPasswordResetEmail(auth,email);
      msg.className='msg ok'; msg.textContent='재설정 메일을 보냈습니다. 메일함(스팸함 포함)을 확인하세요.';
    }catch(err){
      msg.className='msg err';
      msg.textContent = err.code==='auth/user-not-found' ? '등록되지 않은 이메일입니다.'
                      : err.code==='auth/invalid-email' ? '이메일 형식이 올바르지 않습니다.'
                      : '메일 발송에 실패했습니다. 잠시 후 다시 시도하세요.';
    }
  });
</script>
</body>
</html>
